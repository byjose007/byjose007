<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 300" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Byron Armijos — Senior Frontend Engineer">
  <style>
    .bg        { fill: #1e1e1e; }
    .border    { fill: none; stroke: #3e3e3e; stroke-width: 1; }
    .titlebar  { fill: #323233; }
    .tabbar    { fill: #252526; }
    .tab       { fill: #1e1e1e; }
    .filename  { fill: #d4d4d4; font: 12px ui-monospace, SFMono-Regular, 'SF Mono', Consolas, 'Liberation Mono', Menlo, monospace; }
    .meta      { fill: #858585; font: 11px ui-monospace, SFMono-Regular, 'SF Mono', Consolas, 'Liberation Mono', Menlo, monospace; }
    .code      { font: 15px ui-monospace, SFMono-Regular, 'SF Mono', Consolas, 'Liberation Mono', Menlo, monospace; }
    .linenum   { fill: #858585; }
    .comment   { fill: #6a9955; }
    .keyword   { fill: #569cd6; }
    .type      { fill: #4ec9b0; }
    .var       { fill: #9cdcfe; }
    .property  { fill: #9cdcfe; }
    .string    { fill: #ce9178; }
    .punct     { fill: #d4d4d4; }
    .cursor    { fill: #d4d4d4; }
  </style>

  <!-- Card background with subtle border -->
  <rect class="bg" x="0.5" y="0.5" width="999" height="299" rx="8"/>
  <rect class="border" x="0.5" y="0.5" width="999" height="299" rx="8"/>

  <!-- Title bar -->
  <path class="titlebar" d="M0,8 a8,8 0 0 1 8,-8 L992,0 a8,8 0 0 1 8,8 L1000,36 L0,36 Z"/>

  <!-- Traffic lights -->
  <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="18" r="6" fill="#febc2e"/>
  <circle cx="60" cy="18" r="6" fill="#28c840"/>

  <!-- Window title -->
  <text class="filename" x="500" y="22" text-anchor="middle">enbyronment — byron.ts</text>

  <!-- Tab bar -->
  <rect class="tabbar" x="0" y="36" width="1000" height="28"/>
  <path class="tab" d="M12,36 L150,36 L150,64 L12,64 Z"/>
  <text class="filename" x="40" y="55">byron.ts</text>
  <circle cx="135" cy="50" r="2.5" fill="#d4d4d4"/>

  <!-- Code area -->
  <g class="code">
    <!-- Line numbers -->
    <text class="linenum" x="42" y="100" text-anchor="end">1</text>
    <text class="linenum" x="42" y="126" text-anchor="end">2</text>
    <text class="linenum" x="42" y="152" text-anchor="end">3</text>
    <text class="linenum" x="42" y="178" text-anchor="end">4</text>
    <text class="linenum" x="42" y="204" text-anchor="end">5</text>
    <text class="linenum" x="42" y="230" text-anchor="end">6</text>
    <text class="linenum" x="42" y="256" text-anchor="end">7</text>
    <text class="linenum" x="42" y="282" text-anchor="end">8</text>

    <!-- Line 1: comment -->
    <text class="comment" x="65" y="100">// Byron Armijos · Senior Frontend Engineer · Alicante, ES</text>

    <!-- Line 3: const declaration -->
    <text x="65" y="152">
      <tspan class="keyword">const</tspan><tspan class="punct"> </tspan><tspan class="var">byron</tspan><tspan class="punct">: </tspan><tspan class="type">SeniorFrontend</tspan><tspan class="punct"> = {</tspan>
    </text>

    <!-- Line 4: rol -->
    <text x="85" y="178">
      <tspan class="property">rol</tspan><tspan class="punct">:          </tspan><tspan class="string">"Construyo interfaces claras para decisiones complejas"</tspan><tspan class="punct">,</tspan>
    </text>

    <!-- Line 5: especialidad -->
    <text x="85" y="204">
      <tspan class="property">especialidad</tspan><tspan class="punct">: [</tspan><tspan class="string">"Angular"</tspan><tspan class="punct">, </tspan><tspan class="string">"TypeScript"</tspan><tspan class="punct">, </tspan><tspan class="string">"Micro-Frontends"</tspan><tspan class="punct">],</tspan>
    </text>

    <!-- Line 6: experiencia -->
    <text x="85" y="230">
      <tspan class="property">experiencia</tspan><tspan class="punct">:  </tspan><tspan class="string">"10+ años · Aviación · Salud · Banca · Seguros"</tspan><tspan class="punct">,</tspan>
    </text>

    <!-- Line 7: portfolio -->
    <text x="85" y="256">
      <tspan class="property">portfolio</tspan><tspan class="punct">:    </tspan><tspan class="string">"enbyronment.dev"</tspan><tspan class="punct">,</tspan>
    </text>

    <!-- Line 8: closing brace + blinking cursor -->
    <text x="65" y="282" class="punct">};</text>
    <rect class="cursor" x="95" y="270" width="2" height="16">
      <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
