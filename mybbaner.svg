<svg width="860" height="242" viewBox="0 0 860 242" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>GitHub banner Byron Armijos - Frontend Developer</title>
  <desc>Banner estilo VS Code Dark+ con código TypeScript del perfil de Byron Armijos</desc>

  <!-- Window background -->
  <rect width="860" height="242" rx="10" fill="#1e1e1e"/>

  <!-- Traffic lights -->
  <circle cx="28" cy="22" r="6" fill="#ff5f57"/>
  <circle cx="48" cy="22" r="6" fill="#febc2e"/>
  <circle cx="68" cy="22" r="6" fill="#28c840"/>

  <!-- Title bar text -->
  <text x="430" y="27" font-family="'SF Mono','Cascadia Code','Consolas',monospace" font-size="11.5" fill="#858585" text-anchor="middle">enbyronment – byron.ts</text>

  <!-- Tab bar -->
  <rect x="0" y="36" width="860" height="1" fill="#3c3c3c"/>
  <rect x="0" y="37" width="860" height="24" fill="#252526"/>
  <rect x="12" y="41" width="94" height="16" rx="3" fill="#1e1e1e"/>
  <text x="18" y="53" font-family="'SF Mono','Cascadia Code','Consolas',monospace" font-size="11.5" fill="#cccccc">byron.ts</text>
  <!-- Unsaved dot -->
  <circle cx="107" cy="49" r="3.5" fill="#e8a838"/>

  <!-- Gutter -->
  <rect x="0" y="61" width="36" height="181" fill="#1e1e1e"/>

  <!-- Line numbers -->
  <text font-family="'SF Mono','Cascadia Code','Consolas',monospace" font-size="12" fill="#5a5a5a">
    <tspan x="8" y="87">1</tspan>
    <tspan x="8" dy="22">2</tspan>
    <tspan x="8" dy="22">3</tspan>
    <tspan x="8" dy="22">4</tspan>
    <tspan x="8" dy="22">5</tspan>
    <tspan x="8" dy="22">6</tspan>
    <tspan x="8" dy="22">7</tspan>
    <tspan x="8" dy="22">8</tspan>
  </text>

  <!-- Code lines -->
  <text font-family="'SF Mono','Cascadia Code','Consolas',monospace" font-size="13">

    <!-- Line 1: comment -->
    <tspan x="48" y="87" fill="#6a9955">// Byron Armijos · Frontend Developer · Alicante, ES</tspan>

    <!-- Line 2: blank -->
    <tspan x="48" y="109" fill="#cccccc"> </tspan>

    <!-- Line 3: const declaration -->
    <tspan x="48" y="131">
      <tspan fill="#569cd6">const </tspan><tspan fill="#9cdcfe">byron</tspan><tspan fill="#cccccc">: </tspan><tspan fill="#4ec9b0">SeniorFrontend</tspan><tspan fill="#cccccc"> = {</tspan>
    </tspan>

    <!-- Line 4: rol -->
    <tspan x="48" y="153">
      <tspan fill="#cccccc">    </tspan><tspan fill="#9cdcfe">rol</tspan><tspan fill="#cccccc">: </tspan><tspan fill="#ce9178">"Construyo interfaces claras para decisiones complejas"</tspan><tspan fill="#cccccc">,</tspan>
    </tspan>

    <!-- Line 5: especialidad -->
    <tspan x="48" y="175">
      <tspan fill="#cccccc">    </tspan><tspan fill="#9cdcfe">especialidad</tspan><tspan fill="#cccccc">: [</tspan><tspan fill="#ce9178">"Angular"</tspan><tspan fill="#cccccc">, </tspan><tspan fill="#ce9178">"TypeScript"</tspan><tspan fill="#cccccc">, </tspan><tspan fill="#ce9178">"Micro-Frontends"</tspan><tspan fill="#cccccc">],</tspan>
    </tspan>

    <!-- Line 6: experiencia (sin "+10 años") -->
    <tspan x="48" y="197">
      <tspan fill="#cccccc">    </tspan><tspan fill="#9cdcfe">experiencia</tspan><tspan fill="#cccccc">: </tspan><tspan fill="#ce9178">"Aviación · Salud · Banca · Seguros"</tspan><tspan fill="#cccccc">,</tspan>
    </tspan>

    <!-- Line 7: portfolio -->
    <tspan x="48" y="219">
      <tspan fill="#cccccc">    </tspan><tspan fill="#9cdcfe">portfolio</tspan><tspan fill="#cccccc">: </tspan><tspan fill="#ce9178">"enbyronment.dev"</tspan><tspan fill="#cccccc">,</tspan>
    </tspan>

    <!-- Line 8: closing brace + cursor -->
    <tspan x="48" y="238" fill="#cccccc">}; </tspan><tspan fill="#aeafad" font-size="11">█</tspan>

  </text>
</svg>
